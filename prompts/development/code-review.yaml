{{code_snippet}}

Check for:
1. Correctness — logic errors, edge cases, off-by-one errors
2. Security — injection vulnerabilities, authentication, data handling
3. Performance — algorithmic complexity, unnecessary allocations
4. Style — consistency with {{language}} idioms and conventions
5. Maintainability — clarity, documentation, testability
