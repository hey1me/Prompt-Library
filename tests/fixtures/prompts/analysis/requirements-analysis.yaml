Analyze the following requirement for {{domain}}:

{{requirement}}

For each aspect, identify:
1. Clarity — Is the requirement well-defined? What's ambiguous?
2. Completeness — What's missing? Edge cases, error states?
3. Consistency — Does it conflict with existing behavior?
4. Feasibility — Technical and resource constraints
5. Testability — How would you verify this requirement?
6. Priority — Is this essential, nice-to-have, or future?
